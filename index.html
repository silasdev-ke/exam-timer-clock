<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Exam Timer | Dual View Clock + Timer</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <div class="dashboard" id="dashboard">
    <!-- MAIN CONTENT: Clock + Timer panels (expand to fill) -->
    <div class="main-content">
      <div class="clock-card">
        <div class="clock">
          <div class="circle" id="sc" style="--clr:#04fc43;"><i></i></div>
          <div class="circle circle2" id="mn" style="--clr:#fee800;"><i></i></div>
          <div class="circle circle3" id="hr" style="--clr:#ff2972;"><i></i></div>
          <span style="--i:1;"><b>1</b></span> <span style="--i:2;"><b>2</b></span>
          <span style="--i:3;"><b>3</b></span> <span style="--i:4;"><b>4</b></span>
          <span style="--i:5;"><b>5</b></span> <span style="--i:6;"><b>6</b></span>
          <span style="--i:7;"><b>7</b></span> <span style="--i:8;"><b>8</b></span>
          <span style="--i:9;"><b>9</b></span> <span style="--i:10;"><b>10</b></span>
          <span style="--i:11;"><b>11</b></span> <span style="--i:12;"><b>12</b></span>
        </div>
        <div id="time">
          <div id="hours" style="--clr:#ff2972;">00</div>
          <div id="minutes" style="--clr:#fee800;">00</div>
          <div id="seconds" style="--clr:#04fc43;">00</div>
          <div id="ampm">AM</div>
        </div>
      </div>

      <div class="timer-panel">
        <div class="timer-header">
          <h2>📋 EXAM TIMER</h2>
        </div>
        <div class="big-remaining">
          <span id="remainingDisplay">00:00:00</span>
        </div>
        <div class="progress-wrapper">
          <div class="progress-bar-bg">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-percent" id="progressPercent">0%</div>
        </div>
        <div class="info-grid">
          <div class="info-card">
            <div class="info-label">⏱️ DURATION</div>
            <div class="info-value" id="infoDuration">--:--:--</div>
          </div>
          <div class="info-card">
            <div class="info-label">🚀 START</div>
            <div class="info-value" id="infoStart">--:--:--</div>
          </div>
          <div class="info-card">
            <div class="info-label">🏁 END</div>
            <div class="info-value" id="infoEnd">--:--:--</div>
          </div>
        </div>
        <div class="duration-row" id="durationRow">
          <div class="dur-group"><label>min</label><input type="number" id="durationMins" class="dur-input" value="90" min="1" max="720"></div>
          <div class="dur-group"><label>sec</label><input type="number" id="durationSecs" class="dur-input" value="0" min="0" max="59"></div>
          <button id="setDurationBtn" class="btn btn-primary">⚡ Set</button>
        </div>
        <div class="action-buttons">
          <button id="startTimerBtn" class="btn btn-primary">▶ START</button>
          <button id="pauseTimerBtn" class="btn btn-warning">⏸ PAUSE</button>
          <button id="resetTimerBtn" class="btn btn-danger">⟳ RESET</button>
        </div>
        <div class="status-msg" id="statusMsg">⚙️ Set duration & press START</div>
      </div>
    </div>

    <!-- BOTTOM MODE SWITCH + FULLSCREEN BUTTON -->
    <div class="mode-switch">
      <button class="view-option" data-view="clock">Clock</button>
      <button class="view-option active" data-view="both">Both</button>
      <button class="view-option" data-view="timer">Timer</button>
      <button class="fullscreen-btn" id="fullscreenBtn" title="Toggle full screen">⛶ Fullscreen</button>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>

</html>
